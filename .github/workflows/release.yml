name: Release

# Push a tag like `v0.3.1` (driven by `make release BUMP=patch|minor|major`).
# Two parallel Mac builds (Apple Silicon on macos-14, Intel on macos-13),
# both ad-hoc codesigned and ed25519-signed for the updater. The release
# job stitches both arches into one GitHub Release; downstream jobs bump:
#   * simion/homebrew-termic     (Casks/termic.rb gets version + BOTH shas)
#   * simion/termic.dev          (public/updates/latest.json gets BOTH platforms)
#
# Brew users see the new version on `brew upgrade --cask`; running
# Termic instances on either arch see the in-app updater pill within
# ~5 min (CF Pages cache TTL on the manifest).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write           # needed to create the GitHub Release

env:
  # Hard-coded so PRs from forks can't override.
  TAP_REPO: simion/homebrew-termic
  WEBSITE_REPO: simion/termic.dev
  WEBSITE_MANIFEST_PATH: public/updates/latest.json

jobs:
  # Cheap fast-fail: type-check the frontend on Ubuntu (~1 min) before
  # spinning up the ~5-min Mac runners on both arches. Catches the
  # broken-import / bad-prop class of errors that bit v0.1.1, without
  # paying for either Mac runner. Cargo errors get caught later by
  # `tauri build` in build-* since cross-compiling the Rust side from
  # Linux needs the macOS SDK; not worth the setup.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc -b

  # ─── Apple Silicon (arm64) ─────────────────────────────────────────
  # Two arches kept as two explicit jobs (rather than a matrix) so
  # downstream `needs.<job>.outputs.<x>` works per-arch; matrix outputs
  # in GHA can't be addressed by row, which makes the release job ugly.
  build-arm:
    needs: validate
    runs-on: macos-14
    outputs:
      version:   ${{ steps.meta.outputs.version }}
      dmg_name:  ${{ steps.meta.outputs.dmg_name }}
      dmg_sha:   ${{ steps.hashes.outputs.dmg_sha }}
      sig:       ${{ steps.hashes.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version + arch-tagged names
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Tauri lower-cases the productName for the .dmg filename.
          # APFS hid case mismatches locally; GitHub Releases URLs are
          # case-SENSITIVE so the cask MUST reference exactly what
          # Tauri produced. The .app.tar.gz on the other hand IS
          # arch-suffixed by us in the rename step below (Tauri emits
          # the same `termic.app.tar.gz` name on both arches, so we
          # disambiguate before upload).
          echo "dmg_name=termic_${VERSION}_aarch64.dmg" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-arm-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build & sign
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri build -- --target aarch64-apple-darwin
      - name: Compute SHA256 + read .sig + arch-suffix .app.tar.gz
        id: hashes
        run: |
          BUNDLE_DIR=src-tauri/target/aarch64-apple-darwin/release/bundle
          DMG="$BUNDLE_DIR/dmg/${{ steps.meta.outputs.dmg_name }}"
          ls -la "$DMG"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg_sha=$SHA" >> "$GITHUB_OUTPUT"
          # Tauri emits termic.app.tar.gz on both arches - we'd clobber
          # the intel one when we co-upload to a single Release. Rename
          # here so both can coexist as termic_aarch64.app.tar.gz and
          # termic_x64.app.tar.gz; the updater manifest references the
          # arch-suffixed URLs accordingly.
          mv "$BUNDLE_DIR/macos/termic.app.tar.gz"     "$BUNDLE_DIR/macos/termic_aarch64.app.tar.gz"
          mv "$BUNDLE_DIR/macos/termic.app.tar.gz.sig" "$BUNDLE_DIR/macos/termic_aarch64.app.tar.gz.sig"
          SIG=$(cat "$BUNDLE_DIR/macos/termic_aarch64.app.tar.gz.sig")
          { echo 'sig<<EOF'; echo "$SIG"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: termic-${{ steps.meta.outputs.version }}-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/termic_aarch64.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/termic_aarch64.app.tar.gz.sig

  # ─── Intel (x86_64) ────────────────────────────────────────────────
  # macos-13 is the last Intel runner GitHub provides; their roadmap
  # has it on indefinite support (no announced sunset as of 2026-05).
  # If/when it's retired, options are: (a) drop Intel, (b) self-host
  # an Intel runner, (c) cross-compile from arm + lipo. We'll cross
  # that bridge when GitHub announces a date.
  build-intel:
    needs: validate
    runs-on: macos-13
    outputs:
      dmg_name:  ${{ steps.meta.outputs.dmg_name }}
      dmg_sha:   ${{ steps.hashes.outputs.dmg_sha }}
      sig:       ${{ steps.hashes.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve arch-tagged names
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Tauri uses `x64` (not `x86_64`) in the dmg filename for
          # Intel macOS bundles. Verified against a local intel build;
          # don't change without re-checking what Tauri actually emits.
          echo "dmg_name=termic_${VERSION}_x64.dmg" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-intel-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build & sign
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri build -- --target x86_64-apple-darwin
      - name: Compute SHA256 + read .sig + arch-suffix .app.tar.gz
        id: hashes
        run: |
          BUNDLE_DIR=src-tauri/target/x86_64-apple-darwin/release/bundle
          DMG="$BUNDLE_DIR/dmg/${{ steps.meta.outputs.dmg_name }}"
          ls -la "$DMG"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg_sha=$SHA" >> "$GITHUB_OUTPUT"
          mv "$BUNDLE_DIR/macos/termic.app.tar.gz"     "$BUNDLE_DIR/macos/termic_x64.app.tar.gz"
          mv "$BUNDLE_DIR/macos/termic.app.tar.gz.sig" "$BUNDLE_DIR/macos/termic_x64.app.tar.gz.sig"
          SIG=$(cat "$BUNDLE_DIR/macos/termic_x64.app.tar.gz.sig")
          { echo 'sig<<EOF'; echo "$SIG"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: termic-${{ needs.build-arm.outputs.version }}-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/termic_x64.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/termic_x64.app.tar.gz.sig

  # ─── Stitch both arches into one Release ───────────────────────────
  release:
    needs: [build-arm, build-intel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: termic-${{ needs.build-arm.outputs.version }}-aarch64
          path: arm
      - uses: actions/download-artifact@v4
        with:
          name: termic-${{ needs.build-arm.outputs.version }}-x64
          path: intel
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-arm.outputs.version }}
        run: |
          # Notes body is the first thing direct-download users see.
          # The recommended brew path goes first because it picks the
          # right arch automatically AND sidesteps quarantine; the
          # xattr command is the escape hatch for non-brew users on
          # either arch.
          NOTES=$(cat <<EOF
          ## Install

          **Recommended — Homebrew** (auto-selects the right arch + handles Gatekeeper):

          \`\`\`sh
          brew install --cask simion/termic/termic
          \`\`\`

          **Direct .dmg** — pick the one matching your Mac:

          - Apple Silicon (M1/M2/M3/M4): \`termic_${VERSION}_aarch64.dmg\`
          - Intel: \`termic_${VERSION}_x64.dmg\`

          Drag to /Applications, then strip the quarantine flag so macOS
          Gatekeeper lets it launch (you'd otherwise see _"termic can't be
          opened because Apple cannot check it for malicious software"_):

          \`\`\`sh
          xattr -dr com.apple.quarantine /Applications/termic.app
          \`\`\`

          ## Updates

          The app self-updates: future releases land via the in-app **Update** pill
          (top-right of the toolbar). For Homebrew installs, \`brew upgrade --cask\` also works.

          ## Changelog

          See the [v${VERSION} tag](https://github.com/${{ github.repository }}/tree/v${VERSION})
          for the commits in this release.
          EOF
          )
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            arm/dmg/*.dmg arm/macos/* \
            intel/dmg/*.dmg intel/macos/*

  # ─── Bump the Homebrew cask ────────────────────────────────────────
  bump-tap:
    needs: [build-arm, build-intel, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Bump cask (version + per-arch sha256)
        run: |
          cd tap
          VERSION="${{ needs.build-arm.outputs.version }}"
          ARM_SHA="${{ needs.build-arm.outputs.dmg_sha }}"
          INTEL_SHA="${{ needs.build-intel.outputs.dmg_sha }}"
          # The cask uses trailing `# @sha-arm` / `# @sha-intel` anchors
          # so sed can target each sha256 line independently regardless
          # of surrounding context. Don't remove those comments.
          sed -i.bak -E "s|^  version \".*\"|  version \"$VERSION\"|" Casks/termic.rb
          sed -i.bak -E "/@sha-arm/s|sha256 \"[^\"]+\"|sha256 \"$ARM_SHA\"|"     Casks/termic.rb
          sed -i.bak -E "/@sha-intel/s|sha256 \"[^\"]+\"|sha256 \"$INTEL_SHA\"|" Casks/termic.rb
          rm Casks/termic.rb.bak
          git config user.name  "termic-bot"
          git config user.email "termic-bot@users.noreply.github.com"
          git add Casks/termic.rb
          git commit -m "termic $VERSION"
          git push

  # ─── Bump the updater manifest (both platforms) ────────────────────
  bump-website:
    needs: [build-arm, build-intel, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.WEBSITE_REPO }}
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: site
      - name: Write update manifest
        run: |
          cd site
          VERSION="${{ needs.build-arm.outputs.version }}"
          ARM_SIG=$(cat <<'EOF'
          ${{ needs.build-arm.outputs.sig }}
          EOF
          )
          INTEL_SIG=$(cat <<'EOF'
          ${{ needs.build-intel.outputs.sig }}
          EOF
          )
          # tauri-plugin-updater dispatches on `darwin-aarch64` vs
          # `darwin-x86_64`; both URLs point at the arch-suffixed
          # .app.tar.gz we uploaded in the release job.
          BASE="https://github.com/${{ github.repository }}/releases/download/v$VERSION"
          cat > "${{ env.WEBSITE_MANIFEST_PATH }}" <<JSON
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$ARM_SIG",
                "url": "$BASE/termic_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$INTEL_SIG",
                "url": "$BASE/termic_x64.app.tar.gz"
              }
            }
          }
          JSON
          git config user.name  "termic-bot"
          git config user.email "termic-bot@users.noreply.github.com"
          git add "${{ env.WEBSITE_MANIFEST_PATH }}"
          git commit -m "updater: bump to $VERSION"
          git push
